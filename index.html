<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Firefly Night</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Simulation Canvas -->
    <canvas id="simulation-canvas"></canvas>

    <!-- UI Overlay Container -->
    <div id="ui-container">
        <!-- Intro Animation Overlay -->
        <div id="intro-overlay" class="intro-active">
            <h1 class="intro-title">Firefly Night</h1>
            <p class="intro-desc">Tap the screen to call a firefly</p>
            <div class="intro-gestures">
                <span>Double-tap for a swarm</span>
                <span>•</span>
                <span>Long-press to attract</span>
            </div>
        </div>

        <!-- Elegant Watermark Logo (Bottom Right) -->
        <div id="watermark-logo" class="logo-hidden">
            <span class="watermark-text">Firefly Night</span>
        </div>

        <!-- Magical Glowing Button (Center) -->
        <button id="cinematic-btn" class="btn-hidden" aria-label="Experience the Joy">
            <span class="btn-glow-layer"></span>
            <span class="btn-text">Experience the Joy</span>
        </button>
    </div>

    <!-- Scripts -->
    <script src="audio.js"></script>
    <script src="app.js"></script>
</body>
</html>
