<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Firefly Night</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Simulation Canvas -->
    <canvas id="simulation-canvas"></canvas>

    <!-- UI Overlay Container -->
    <div id="ui-container">
        <!-- Intro Animation Overlay -->
        <div id="intro-overlay" class="intro-active">
            <p class="intro-desc">Tap the screen to call a firefly</p>
            <div class="intro-gestures">
                <span>Double-tap for a swarm</span>
                <span>•</span>
                <span>Long-press to attract</span>
            </div>
        </div>

        <!-- Elegant Watermark Logo (Bottom Right) -->
        <div id="watermark-logo" class="logo-hidden">
            <span class="watermark-text">Firefly Night</span>
        </div>

        <!-- Magical Glowing Button (Center) -->
        <button id="cinematic-btn" class="btn-hidden" aria-label="Experience the Joy">
            <span class="btn-glow-layer"></span>
            <span class="btn-text">Experience the Joy</span>
        </button>

        <!-- Settings Gear Icon (Top Right) -->
        <button id="settings-toggle-btn" class="settings-btn" aria-label="Settings">
            <svg viewBox="0 0 24 24" width="22" height="22">
                <path fill="currentColor" d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
            </svg>
        </button>

        <!-- Settings Overlay Panel -->
        <div id="settings-panel" class="panel-hidden">
            <div class="panel-header">
                <h3>Settings</h3>
                <button id="settings-close-btn" aria-label="Close settings">&times;</button>
            </div>
            <div class="panel-body">
                <div class="setting-item">
                    <label for="volume-control">Ambience Volume</label>
                    <div class="slider-container">
                        <input type="range" id="volume-control" min="0" max="100" value="80">
                        <span id="volume-val">80%</span>
                    </div>
                </div>
                <div class="setting-item">
                    <label for="threshold-control">Sequence Threshold</label>
                    <div class="slider-container">
                        <input type="range" id="threshold-control" min="10" max="350" value="20">
                        <span id="threshold-val">20 fireflies</span>
                    </div>
                </div>
                <div class="setting-item toggle-item">
                    <span>Moonlight Background</span>
                    <label class="switch">
                        <input type="checkbox" id="moonlight-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="setting-item toggle-item">
                    <span>Floating Dust Particles</span>
                    <label class="switch">
                        <input type="checkbox" id="dust-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="panel-buttons">
                    <button id="screenshot-btn" class="action-btn">Capture Scene</button>
                    <button id="reset-btn" class="action-btn danger">Reset Experience</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="audio.js"></script>
    <script src="app.js"></script>
</body>
</html>
